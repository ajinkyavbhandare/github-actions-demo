trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
# 1. Use a single, stable Python version
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.12'
  displayName: 'Use Python 3.12'

# 2. Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: 'Install dependencies'

# 3. Run tests using your existing Makefile logic
# This ensures consistency between your local machine and the CI
- script: |
    make install
    make test
  displayName: 'Run Make targets'
